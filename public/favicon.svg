<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="100" height="100" rx="14" fill="#0d0d1a"/>

  <!-- Neon border -->
  <rect width="100" height="100" rx="14" fill="none" stroke="#ff00ff" stroke-width="3" opacity="0.55"/>

  <!-- BD text -->
  <text
    x="11"
    y="71"
    font-family="'Arial Black', 'Arial', sans-serif"
    font-weight="900"
    font-size="58"
    fill="#e0e0ff"
    letter-spacing="-3"
  >BD</text>

  <!-- Magenta dot -->
  <circle cx="86" cy="68" r="9" fill="#ff00ff" filter="url(#glow)"/>
</svg>
